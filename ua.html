<!doctype html>
<html>

<head>
  <meta charset='utf-8'>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes">
  <style>
    * {
      margin: .4rem 0;
    }

    body {
      max-width: 40rem;
      padding: .8rem;
      margin: auto;
    }

    textarea {
      width: 90%;
      resize: none;
    }
  </style>
  <title>User Agent</title>
</head>

<body>
  <span>当前浏览器 UA</span>
  <hr>
  <textarea id='ua' rows=5 readonly></textarea>
  <br>
  <button onclick='copy()'>复制到剪贴板</button>
  <script>
    var ua = navigator.userAgent;
    document.getElementById('ua').textContent = ua;
    function copy() { navigator.clipboard.writeText(ua) }
  </script>
</body>

</html>
