<!doctype html>
<html>

<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1, user-scalable=no'>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <title>BPM 检测器</title>
</head>

<body>
  <main class="container">
    <hgroup>
      <h3>BPM 检测器</h3>
      <p>有节奏地点击按钮来测算 BPM！</p>
    </hgroup>
    <hr>
    <div class="grid">
      <input type="reset" onclick='reset()' value="重置">
      <input readonly id="bpm" style="text-align: center;" value="平均 BPM：0">
      <input type='button' onclick='calc()' value="点击我">
    </div>
  </main>
  <script>
    "use strict";
    let t = new Array();
    function calc() {
      t.push(Date.now());
      if (t.length >= 2) {
        let tm = t.at(-1) - t.at(0);
        let bpm = ((t.length - 1) * 60000 / tm).toFixed(2);
        document.getElementById("bpm").value = "平均 BPM：" + bpm;
      }
    }
    function reset() {
      t = new Array();
      document.getElementById("bpm").value = "平均 BPM：0";
    }
  </script>
</body>

</html>
