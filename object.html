<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes">
  <title>osu!mania 段位单曲物量统计</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="py-4">
  <div class="container" style="max-width: 800px;">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap">
      <h1 class="h4 mb-0">osu!mania 段位单曲物量统计</h1>
    </div>
    <hr class="mt-1 mb-3">
    <div class="row g-3 mb-4">
      <div class="col-sm-6">
        <label class="form-label">段位有多少首歌？</label>
        <input type="number" class="form-control" id="songCount" min="1" max="10" value="4">
      </div>
      <div class="col-sm-6">
        <label class="form-label">请选择谱面文件：</label>
        <input type="file" class="form-control" id="osuFile" accept=".osu">
      </div>
    </div>
    <div id="gapPanel" class="mb-4">
      <div class="alert alert-secondary py-2 mb-0">未选择文件</div>
    </div>
    <div id="outputPanel"></div>
  </div>

  <script>
    "use strict";
    (() => {
      const songCountInput = document.getElementById('songCount');
      const fileInput = document.getElementById('osuFile');
      const gapDiv = document.getElementById('gapPanel');
      const outDiv = document.getElementById('outputPanel');

      let totalNotes = 0, totalLongNotes = 0;
      let gaps = [];

      const fmt = ms => {
        const m = String(Math.floor(ms / 60000)).padStart(2, '0');
        const s = String(Math.floor((ms % 60000) / 1000)).padStart(2, '0');
        const msStr = String(ms % 1000).padStart(3, '0');
        return `${m}:${s}:${msStr}`;
      };

      const parseOsu = text => {
        const objects = [];
        let inHit = false, notes = 0, lnotes = 0;
        for (let line of text.split(/\r?\n/)) {
          line = line.trim();
          if (!line) continue;
          if (line === '[HitObjects]') { inHit = true; continue; }
          if (!inHit) continue;
          const parts = line.split(':')[0].split(',');
          if (parts.length < 4) continue;
          const head = +parts[2];
          const type = +parts[3];
          const tailRaw = +parts[5];
          const tail = (type >> 7) & 1 ? tailRaw : head;
          objects.push({ head, tail });
          notes++;
          if ((type >> 7) & 1) lnotes++;
        }
        return { objects, notes, lnotes };
      };

      const computeGaps = objects => {
        if (!objects.length) return [];
        const sorted = [...objects].sort((a, b) => a.head - b.head || a.tail - b.tail);
        const merged = [];
        let cur = { ...sorted[0] };
        let curTotal = 1, curLN = cur.head !== cur.tail ? 1 : 0;
        for (let i = 1; i < sorted.length; i++) {
          const o = sorted[i];
          if (o.head <= cur.tail) {
            if (o.tail > cur.tail) cur.tail = o.tail;
            curTotal++;
            if (o.head !== o.tail) curLN++;
          } else {
            merged.push({ ...cur, total: curTotal, totalLN: curLN });
            cur = { ...o };
            curTotal = 1;
            curLN = o.head !== o.tail ? 1 : 0;
          }
        }
        merged.push({ ...cur, total: curTotal, totalLN: curLN });
        const gapsRaw = [];
        let accTotal = merged[0].total, accLN = merged[0].totalLN;
        for (let i = 1; i < merged.length; i++) {
          const prev = merged[i - 1], curr = merged[i];
          if (prev.tail < curr.head) {
            gapsRaw.push({
              cnt: accTotal,
              lcnt: accLN,
              head: prev.tail,
              tail: curr.head
            });
          }
          accTotal += curr.total;
          accLN += curr.totalLN;
        }
        return gapsRaw.filter(g => g.tail - g.head >= 1000)
          .sort((a, b) => (b.tail - b.head) - (a.tail - a.head));
      };

      const renderOutput = () => {
        if (!totalNotes && !gaps.length) {
          outDiv.innerHTML = '';
          return;
        }
        const selected = [];
        document.querySelectorAll('input[name="gap"]').forEach(cb => {
          if (cb.checked) {
            const idx = +cb.value;
            if (gaps[idx]) selected.push({ cnt: gaps[idx].cnt, lcnt: gaps[idx].lcnt });
          }
        });
        selected.push({ cnt: totalNotes, lcnt: totalLongNotes }, { cnt: 0, lcnt: 0 });
        selected.sort((a, b) => a.cnt - b.cnt);

        let out = `num: ${selected.length - 1},\nnote: [${selected[1].cnt}`;
        for (let i = 2; i < selected.length; i++) out += `, ${selected[i].cnt - selected[i - 1].cnt}`;
        const showLN = document.getElementById('showLN')?.checked;
        if (showLN) {
          out += `],\nlnote: [${selected[1].lcnt}`;
          for (let i = 2; i < selected.length; i++) out += `, ${selected[i].lcnt - selected[i - 1].lcnt}`;
        }
        out += ']';
        outDiv.innerHTML = `<div class="card"><div class="card-body p-3">
                          <pre class="mb-2" id="codeBlock" style="background:#f8f9fa;padding:0.75rem;border-radius:0.375rem;">${out}</pre>
                          <button class="btn btn-sm btn-outline-secondary" onclick="navigator.clipboard.writeText(document.getElementById('codeBlock').innerText)">复制</button>
                        </div></div>`;
      };

      const autoCheck = () => {
        const cnt = +songCountInput.value;
        const boxes = document.querySelectorAll('input[name="gap"]');
        boxes.forEach((cb, idx) => cb.checked = idx < cnt - 1);
        renderOutput();
      };

      const refreshPanel = () => {
        if (!gaps.length && totalNotes === 0) {
          gapDiv.innerHTML = '<div class="alert alert-secondary py-2 mb-0">未选择文件或谱面无有效数据</div>';
          outDiv.innerHTML = '';
          return;
        }
        let html = `<div class="card mb-3"><div class="card-body p-3">
                  <div class="mb-2"><strong>总物量：</strong>${totalNotes}，<strong>总 LN 物量：</strong>${totalLongNotes}</div>
                  <div class="mb-2"><strong>请选择正确的休息时段：</strong></div>
                  <div class="row g-2">`;
        gaps.forEach((g, i) => {
          const sec = ((g.tail - g.head) / 1000).toFixed(3);
          html += `<div class="col-sm-6">
                 <div class="form-check">
                   <input class="form-check-input" type="checkbox" name="gap" value="${i}" id="gap_${i}">
                   <label class="form-check-label font-monospace" for="gap_${i}">${sec}s [${fmt(g.head)}，${fmt(g.tail)}]</label>
                 </div>
               </div>`;
        });
        html += `</div><hr class="my-2"><div class="form-check">
               <input class="form-check-input" type="checkbox" id="showLN">
               <label class="form-check-label" for="showLN">显示 LN 物量</label>
             </div></div></div>`;
        gapDiv.innerHTML = html;
        gapDiv.querySelectorAll('input').forEach(inp => inp.addEventListener('change', renderOutput));
        songCountInput.addEventListener('input', autoCheck);
        autoCheck();
      };

      fileInput.addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          const { objects, notes, lnotes } = parseOsu(ev.target.result);
          totalNotes = notes;
          totalLongNotes = lnotes;
          gaps = computeGaps(objects);
          refreshPanel();
        };
        reader.onerror = () => gapDiv.innerHTML = '<div class="alert alert-danger py-2 mb-0">文件读取失败</div>';
        reader.readAsText(file, 'UTF-8');
      });
    })();
  </script>
</body>

</html>
